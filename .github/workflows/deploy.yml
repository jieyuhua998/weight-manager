name: Deploy to Aliyun Nginx

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Aliyun Server via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          source: "index.html,styles.css,script.js,README.md"
          target: "/tmp/weight-manager-deploy"
          strip_components: 0

      - name: Move files to target directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          script: |
            # 设置项目目录
            PROJECT_DIR="/usr/local/nginx/html/hls2"

            # 创建目录（如果不存在）
            mkdir -p $PROJECT_DIR

            # 备份旧版本
            if [ -d "$PROJECT_DIR" ]; then
              rm -rf $PROJECT_DIR/backup
              cp -r $PROJECT_DIR $PROJECT_DIR/backup
            fi

            # 复制文件到项目目录
            cp -r /tmp/weight-manager-deploy/* $PROJECT_DIR/

            # 清理临时文件
            rm -rf /tmp/weight-manager-deploy

            echo "Deploy completed at $(date)"
